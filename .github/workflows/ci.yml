name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # 1) 構文・未定義名チェック＋ブラウザ不要の単体テスト（Linux で高速に）
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff
      - name: Ruff (syntax / undefined names)
        run: ruff check .
      - name: Compile all
        run: python -m compileall -q .
      - name: Unit tests (no browser, no LLM)
        run: pytest -q

  # 2) 配管テスト: 実ブラウザ(Edge)でローカルテストサイトを操作（LLM 不要）
  selftest-windows:
    runs-on: windows-latest   # Edge / msedgedriver 対応の Selenium Manager が使える
    env:
      PYTHONUTF8: "1"         # ← この2行を追加（日本語出力の UnicodeEncodeError 対策）
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Start local test site
        shell: pwsh
        run: |
          Start-Process -FilePath python -ArgumentList '-m','http.server','8000' -WorkingDirectory test_site
          Start-Sleep -Seconds 3
      - name: Selftest (Selenium + Edge, headless)
        run: python test_site/selftest.py --browser edge --headless
      - name: Selftest (Playwright + Edge, headless)
        run: python test_site/selftest.py --engine playwright --browser edge --headless
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selftest-screenshots
          path: output/*.png
          if-no-files-found: ignore
